  url: http://localhost:8080/api/job/optimalTeam?driverList=Kimi Antonelli,Oliver Bearman,Lance Stroll,Liam Lawson,Nico Hulkenberg&teamList=Mercedes,Ferrari&changeLimit=2
  params:
    - name: driverList
      value: Kimi Antonelli,Oliver Bearman,Lance Stroll,Liam Lawson,Nico Hulkenberg
      type: query
    - name: teamList
      value: Mercedes,Ferrari
      type: query
    - name: changeLimit
      value: "2"
