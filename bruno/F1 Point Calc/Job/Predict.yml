info:
  name: Predict
  type: http
  seq: 4

http:
  method: GET
  url: http://localhost:8080/api/job/predict?raceName=Canada&isSprint=True
  params:
    - name: raceName
      value: Canada
      type: query
    - name: isSprint
      value: "True"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
